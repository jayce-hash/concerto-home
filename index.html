<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Concerto Dashboard</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #F0F2F5; 
      --card-bg: #FFFFFF;
      --text: #121E36;
      --text-dim: rgba(18, 30, 54, 0.55);
      --border: rgba(18, 30, 54, 0.06);
      --gold: #C9A84C;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      background-color: var(--bg); color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overscroll-behavior-y: none; -webkit-font-smoothing: antialiased;
      width: 100vw; overflow-x: hidden;
    }

    /* ─── NATIVE APP SPACING ─── */
    .dashboard { 
      padding: env(safe-area-inset-top, 20px) 20px calc(env(safe-area-inset-bottom, 20px) + 60px); 
      display: flex; flex-direction: column; gap: 20px; 
    }

    /* ─── APP HEADER WITH LOGO ─── */
    .app-header { 
      display: flex; flex-direction: column; align-items: center; 
      padding: 20px 0 10px; position: relative;
    }
    .main-logo {
      width: 180px; height: auto; display: block;
      margin-bottom: 5px;
    }
    .add-event-btn {
      position: absolute; right: 4px; bottom: 12px;
      font-size: 28px; font-weight: 300; opacity: 0.3; cursor: pointer;
    }

    /* ─── UP NEXT CARD ─── */
    .up-next-card {
      background: var(--text); color: #fff; border-radius: 30px;
      padding: 24px; position: relative; overflow: hidden;
      box-shadow: 0 16px 40px rgba(18, 30, 54, 0.2); transition: transform 0.2s;
    }
    .up-next-card:active { transform: scale(0.98); }
    .up-next-tag { background: rgba(255,255,255,0.1); color: #fff; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; padding: 5px 12px; border-radius: 999px; width: fit-content; margin-bottom: 20px; }
    .up-next-title { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 700; line-height: 1; margin-bottom: 6px; }
    .up-next-venue { font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.6); margin-bottom: 20px; }
    
    .countdown-row { display: flex; gap: 8px; }
    .cd-box { background: rgba(255,255,255,0.08); border-radius: 14px; padding: 10px; flex: 1; text-align: center; }
    .cd-num { font-size: 22px; font-weight: 800; line-height: 1; margin-bottom: 2px; }
    .cd-label { font-size: 8px; font-weight: 700; text-transform: uppercase; color: rgba(255,255,255,0.4); }

    /* ─── BENTO GRID ─── */
    .bento-grid { display: grid; grid-template-columns: 1fr 1fr; grid-auto-rows: 130px; gap: 16px; }
    .bento-card {
      background: var(--card-bg); border-radius: 24px; padding: 18px;
      position: relative; overflow: hidden; border: 1px solid var(--border);
      box-shadow: 0 4px 15px rgba(0,0,0,0.02); display: flex; flex-direction: column; justify-content: space-between;
    }
    .bento-title { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 700; color: var(--text); }
    .bento-sub { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); }
    .span-2 { grid-column: span 2; }
    .card-premium { background: var(--text); color: #fff; border: none; }
    .card-premium .bento-title { color: #fff; font-size: 24px; }
    .card-premium .bento-sub { color: var(--gold); }

    /* ─── MODAL ─── */
    #show-modal {
      position: fixed; inset: 0; background: rgba(18,30,54, 0.4); backdrop-filter: blur(15px);
      z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px;
    }
    .modal-content {
      background: white; width: 100%; max-width: 340px; border-radius: 30px; padding: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .modal-content h3 { font-family: 'Cormorant Garamond', serif; font-size: 24px; margin-bottom: 20px; }
    input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 12px; font-family: 'DM Sans', sans-serif; font-size: 16px; outline: none; }
    .save-btn { width: 100%; background: var(--text); color: white; padding: 15px; border-radius: 12px; font-weight: 700; text-transform: uppercase; border: none; margin-top: 10px; cursor: pointer; }

    /* ─── TOOLKIT ─── */
    .toolkit-card { background: var(--card-bg); border-radius: 28px; padding: 20px; border: 1px solid var(--border); }
    .h-scroll { display: flex; overflow-x: auto; gap: 10px; padding: 10px 0; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
    .h-scroll::-webkit-scrollbar { display: none; }
    .tool-pill { flex-shrink: 0; background: var(--bg); border-radius: 999px; padding: 12px 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--text); }

  </style>
</head>
<body>

  <div id="show-modal">
    <div class="modal-content">
      <h3>Set Your Next Show</h3>
      <input type="text" id="artist-input" placeholder="Artist or Team">
      <input type="text" id="venue-input" placeholder="Venue & City">
      <input type="datetime-local" id="date-input">
      <button class="save-btn" onclick="saveShow()">Save Event</button>
      <p onclick="closeModal()" style="text-align: center; margin-top: 15px; font-size: 12px; color: var(--text-dim); font-weight: 700; text-transform: uppercase; cursor: pointer;">Cancel</p>
    </div>
  </div>

  <main class="dashboard">
    <header class="app-header">
      <img src="https://buildfire.imgix.net/8ef92dbd-0a8b-11f0-a97f-12565309935d/1767664539328.png" alt="Concerto Logo" class="main-logo">
      <div class="add-event-btn" onclick="openModal()">+</div>
    </header>

    <div class="up-next-card" onclick="openModal()">
      <div class="up-next-tag">Countdown</div>
      <h2 class="up-next-title" id="display-artist">Set Your Next Show</h2>
      <div class="up-next-venue" id="display-venue">Tap to add your upcoming event</div>
      
      <div class="countdown-row">
        <div class="cd-box"><div class="cd-num" id="cd-days">00</div><div class="cd-label">Days</div></div>
        <div class="cd-box"><div class="cd-num" id="cd-hours">00</div><div class="cd-label">Hrs</div></div>
        <div class="cd-box"><div class="cd-num" id="cd-mins">00</div><div class="cd-label">Mins</div></div>
        <div class="cd-box"><div class="cd-num" id="cd-secs">00</div><div class="cd-label">Secs</div></div>
      </div>
    </div>

    <div class="bento-grid">
      <div class="bento-card span-2 card-premium" onclick="routeTo('Concerto+', '169d5e94-6c5e-4769-b4ca-a7d0175985e7-1753914028797')">
        <div class="bento-sub">Concerto Premium</div>
        <h3 class="bento-title">Build your<br>Concerto+ Itinerary.</h3>
      </div>
      <div class="bento-card" onclick="routeTo('Bag Check', '169d5e94-6c5e-4769-b4ca-a7d0175985e7-1772922931812')">
        <div class="bento-sub">AI Tool</div>
        <h3 class="bento-title">AI Bag<br>Check.</h3>
      </div>
      <div class="bento-card" onclick="routeTo('Live Mode', '169d5e94-6c5e-4769-b4ca-a7d0175985e7-1772904343170')">
        <div class="bento-sub">In-Show</div>
        <h3 class="bento-title">Live Mode<br>Recaps.</h3>
      </div>
    </div>

    <div class="toolkit-card">
      <div style="font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 700; margin-bottom: 10px;">Venue Toolkit</div>
      <div class="h-scroll">
        <div class="tool-pill" onclick="routeTo('Rideshare', '169d5e94-6c5e-4769-b4ca-a7d0175985e7-1765237012145')">Rideshare</div>
        <div class="tool-pill" onclick="routeTo('Parking', '169d5e94-6c5e-4769-b4ca-a7d0175985e7-1765234093628')">Parking</div>
        <div class="tool-pill" onclick="routeTo('Bag Policies', '169d5e94-6c5e-4769-b4ca-a7d0175985e7-1765234047030')">Bag Policy</div>
        <div class="tool-pill" onclick="routeTo('Concessions', '169d5e94-6c5e-4769-b4ca-a7d0175985e7-1765234072898')">Food</div>
      </div>
    </div>
  </main>

  <script>
    function routeTo(title, instanceId) {
      if (typeof buildfire !== 'undefined' && buildfire.actionItems) {
        buildfire.actionItems.execute({title: title, action: 'linkToApp', instanceId: instanceId}, () => {});
      }
    }

    function openModal() { document.getElementById('show-modal').style.display = 'flex'; }
    function closeModal() { document.getElementById('show-modal').style.display = 'none'; }

    function saveShow() {
      const artist = document.getElementById('artist-input').value;
      const venue = document.getElementById('venue-input').value;
      const date = document.getElementById('date-input').value;
      
      if(artist && date) {
        localStorage.setItem('concerto_artist', artist);
        localStorage.setItem('concerto_venue', venue);
        localStorage.setItem('concerto_date', date);
        loadSavedShow();
        closeModal();
      }
    }

    function loadSavedShow() {
      const artist = localStorage.getItem('concerto_artist');
      const venue = localStorage.getItem('concerto_venue');
      const date = localStorage.getItem('concerto_date');
      if(artist && date) {
        document.getElementById('display-artist').innerText = artist;
        document.getElementById('display-venue').innerText = venue || "Venue TBD";
        startCountdown(new Date(date).getTime());
      }
    }

    function startCountdown(targetTime) {
      setInterval(() => {
        const now = new Date().getTime();
        const diff = targetTime - now;
        if(diff < 0) return;
        document.getElementById('cd-days').innerText = Math.floor(diff / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
        document.getElementById('cd-hours').innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
        document.getElementById('cd-mins').innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
        document.getElementById('cd-secs').innerText = Math.floor((diff % (1000 * 60)) / 1000).toString().padStart(2, '0');
      }, 1000);
    }

    loadSavedShow();
  </script>
</body>
</html>
